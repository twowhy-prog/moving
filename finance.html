<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 재정 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
    --text: #1e293b; --sub: #64748b; --input-bg: #f1f5f9;
    --red: #ef4444; --yellow: #f59e0b; --green: #10b981;
    --blue: #3b82f6; --purple: #8b5cf6;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #f1f5f9; --sub: #94a3b8; --input-bg: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; }
  /* ==================== 아래부터 원본 스타일 전체 ==================== */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 700; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 12px; }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (max-width: 1100px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px)  { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .summary-grid { grid-template-columns: 1fr; } }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--border); }
  .summary-card .s-num { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: 0.5px; margin-bottom: 2px; }
  .summary-card .s-title { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .summary-card .value { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .summary-card .sub { font-size: 11px; color: var(--sub); margin-top: 3px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .section-header { padding: 14px 18px; display: flex; align-items: center; cursor: pointer; user-select: none; }
  .section-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .section-num { background: var(--blue); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-right: 10px; flex-shrink: 0; }
  .toggle-icon { font-size: 12px; color: var(--sub); transition: transform 0.2s; }
  .section-body { padding: 0 18px 18px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  .field input[type="number"], .field input[type="text"], .field select {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--input-bg); color: var(--text); font-size: 14px;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--blue); border-color: var(--blue); }
  .field-adjust { display: flex; align-items: center; gap: 4px; }
  .field-adjust input { flex: 1; }
  .adjust-btn { width: 28px; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600; }
  .adjust-btn:hover { background: var(--border); }
  .result-box { background: var(--input-bg); border-radius: 8px; padding: 14px; margin-top: 12px; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .result-row:last-child { border-bottom: none; }
  .result-row.total { font-weight: 700; font-size: 15px; margin-top: 4px; }
  .sep { height: 1px; background: var(--border); margin: 14px 0; }
  .info { font-size: 11px; color: var(--sub); margin-top: 6px; }
  /* ... (원본의 모든 스타일 포함) ... */
</style>
</head>
<body>

<!-- 탭 네비게이션 -->
<div style="background:#0f172a;display:flex;padding:0 20px">
  <a href="finance.html" style="display:inline-block;padding:10px 20px;color:#fff;font-size:13px;font-weight:700;border-bottom:3px solid #3b82f6;text-decoration:none">💰 재정 계산기</a>
  <a href="compare.html" style="display:inline-block;padding:10px 20px;color:#94a3b8;font-size:13px;font-weight:600;border-bottom:3px solid transparent;text-decoration:none" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">📊 입지 비교</a>
</div>

<header>
  <h1>🏠 부동산 재정 계산기</h1>
  <div class="header-actions">
    <button class="btn" onclick="toggleTheme()">🌙 다크모드</button>
    <button class="btn" onclick="resetToDefaults()" style="color:var(--sub)">↺ 초기화</button>
    <button class="btn btn-primary" onclick="exportPDF()">📄 PDF 저장</button>
  </div>
</header>

<div class="container">

  <!-- 종합 요약 -->
  <div class="summary-grid" id="summaryGrid" style="grid-template-columns:repeat(4,1fr)">
    <!-- 원본 그대로 -->
  </div>

  <!-- ===== 섹션 1: 매도 분석 (원본) ===== -->
  <div class="section" id="sec1">
    <!-- 원본 매도 분석 전체 -->
  </div>

  <!-- ===== [새로 추가] 섹션 2: 매수 납부 일정 ===== -->
  <div class="section" id="sec2">
    <div class="section-header" onclick="toggleSection('sec2')">
      <div class="section-num">2</div>
      <h2>매수 납부 일정 (가계약 → 잔금)</h2>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="section-body">
      <div class="grid-3">
        <div class="field">
          <label>가계약금 (토지거래허가 전, 만원)</label>
          <div class="field-adjust">
            <button class="adjust-btn" onclick="adjustValue('preContract', -500)">-500</button>
            <input type="number" id="preContract" value="5000" oninput="calc()">
            <button class="adjust-btn" onclick="adjustValue('preContract', 500)">+500</button>
          </div>
        </div>
        <div class="field">
          <label>계약금 (허가 후, 만원)</label>
          <div class="field-adjust">
            <button class="adjust-btn" onclick="adjustValue('contractDeposit', -1000)">-1000</button>
            <input type="number" id="contractDeposit" value="10000" oninput="calc()">
            <button class="adjust-btn" onclick="adjustValue('contractDeposit', 1000)">+1000</button>
          </div>
        </div>
        <div class="field">
          <label>중도금 총액 (만원)</label>
          <div class="field-adjust">
            <button class="adjust-btn" onclick="adjustValue('intermediateTotal', -5000)">-5000</button>
            <input type="number" id="intermediateTotal" value="60000" oninput="calc()">
            <button class="adjust-btn" onclick="adjustValue('intermediateTotal', 5000)">+5000</button>
          </div>
        </div>
        <div class="field">
          <label>중도금 납부 횟수</label>
          <input type="number" id="intermediateTimes" value="3" min="1" oninput="calc()">
        </div>
        <div class="field">
          <label>잔금 (만원)</label>
          <div class="field-adjust">
            <button class="adjust-btn" onclick="adjustValue('balancePayment', -5000)">-5000</button>
            <input type="number" id="balancePayment" value="85000" oninput="calc()">
            <button class="adjust-btn" onclick="adjustValue('balancePayment', 5000)">+5000</button>
          </div>
        </div>
      </div>

      <div class="result-box">
        <div class="result-row"><span>가계약금</span><span id="r_preContract">5,000</span></div>
        <div class="result-row"><span>계약금</span><span id="r_contractDeposit">10,000</span></div>
        <div class="result-row"><span>중도금 총액</span><span id="r_intermediateTotal">60,000</span></div>
        <div class="result-row"><span>잔금</span><span id="r_balancePayment">85,000</span></div>
        <div class="sep"></div>
        <div class="result-row total"><span>🧾 총 납부 예정액</span><span id="r_totalPayment" class="color-blue">160,000</span></div>
        <div class="info">* 총 납부 예정액은 매수가와 거의 일치해야 합니다</div>
      </div>
    </div>
  </div>

  <!-- ===== 기존 섹션들 (번호 +1) ===== -->
  <!-- sec2 → sec3, sec3 → sec4 ... (원본 코드에서 id="sec2"를 id="sec3"로 바꾸는 식으로) -->

</div>

<script>
// ===== 원본 스크립트 + 새 납부 일정 로직 =====
function $(id) { return document.getElementById(id); }

function val(id) {
  const el = $(id);
  return el ? Number(el.value) || 0 : 0;
}

function fmt(num) {
  return num.toLocaleString('ko-KR');
}

function adjustValue(id, delta) {
  const el = $(id);
  if (el) {
    el.value = Number(el.value) + delta;
    calc();
  }
}

// ===== calc() 함수에 새 로직 추가 =====
function calc() {
  // ... (원본 calc() 전체 코드 그대로) ...

  // === 매수 납부 일정 계산 ===
  const preContract     = val('preContract');
  const contractDeposit = val('contractDeposit');
  const intermediate    = val('intermediateTotal');
  const balance         = val('balancePayment');
  const totalPayment    = preContract + contractDeposit + intermediate + balance;

  if ($('r_preContract')) $('r_preContract').textContent = fmt(preContract);
  if ($('r_contractDeposit')) $('r_contractDeposit').textContent = fmt(contractDeposit);
  if ($('r_intermediateTotal')) $('r_intermediateTotal').textContent = fmt(intermediate);
  if ($('r_balancePayment')) $('r_balancePayment').textContent = fmt(balance);
  if ($('r_totalPayment')) $('r_totalPayment').textContent = fmt(totalPayment);

  // ... (원본 calc() 나머지 부분) ...
}

// 나머지 원본 함수들 (toggleSection, toggleTheme, exportPDF 등) 그대로 유지

window.onload = function() {
  calc();
};
</script>
</body>
</html>
